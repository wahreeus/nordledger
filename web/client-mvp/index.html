<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NordLedger Sign In</title>
  <style>
    :root {
      --bg: #020817;
      --card-bg: #ffffff;
      --text: #ffffff;
      --dark: #020617;
      --soft-2: #64748b;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      --radius-xl: 28px;
      --radius-md: 14px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      font-family: var(--font);
    }

    body {
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.18), transparent 32%),
        linear-gradient(to bottom, rgba(15, 23, 42, 0.1), rgba(15, 23, 42, 0.9));
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card-bg);
      color: var(--dark);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
      animation: fadeUp 0.45s ease forwards;
    }

    .card-head {
      padding: 28px 28px 12px;
    }

    .card-title {
      margin: 0;
      font-size: 36px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .card-copy {
      margin: 10px 0 0;
      color: var(--soft-2);
      font-size: 14px;
      line-height: 1.7;
    }

    .card-body {
      padding: 8px 28px 28px;
    }

    .actions {
      display: grid;
      gap: 14px;
    }

    .submit {
      height: 48px;
      width: 100%;
      border: none;
      border-radius: var(--radius-md);
      background: #0f172a;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    .submit:hover:not(:disabled) {
      transform: translateY(-1px);
      background: #020617;
    }

    .submit:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .note {
      margin: 0;
      color: var(--soft-2);
      font-size: 13px;
      line-height: 1.7;
      text-align: center;
    }

    .feedback {
      min-height: 20px;
      color: #475569;
      font-size: 13px;
      text-align: center;
    }

    .feedback.error {
      color: #b91c1c;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 16px;
      }

      .card-head,
      .card-body {
        padding-left: 20px;
        padding-right: 20px;
      }

      .card-title {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="card-head">
        <h2 class="card-title">Welcome to NordLedger</h2>
        <p class="card-copy">Sign in to access customer records, invoice data, and analytics.</p>
      </div>

      <div class="card-body">
        <div class="actions">
          <button class="submit" id="signInButton" type="button">
            <span>Sign in with Cognito</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M13 6L19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <p class="note">Authentication is handled by Amazon Cognito. After successful sign-in, you will be directed to the NordLedger dashboard.</p>
          <div class="feedback" id="feedback" aria-live="polite"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { beginLogin, getSession } from "./auth.js";

    const signInButton = document.getElementById("signInButton");
    const feedback = document.getElementById("feedback");

    signInButton.addEventListener("click", async () => {
      signInButton.disabled = true;
      feedback.classList.remove("error");
      feedback.textContent = "Redirecting to sign-in...";

      try {
        await beginLogin({ requestedPath: "/dashboard.html" });
      } catch (error) {
        console.error(error);
        feedback.textContent = error.message || "Unable to start sign-in.";
        feedback.classList.add("error");
        signInButton.disabled = false;
      }
    });

    (async function checkExistingSession() {
      const session = await getSession();

      if (session.isValid) {
        feedback.textContent = "Existing session found. Redirecting to dashboard...";
        window.location.replace("/dashboard.html");
      } else if (session.error) {
        feedback.textContent = session.error.message;
        feedback.classList.add("error");
      }
    })();
  </script>
</body>
</html>
