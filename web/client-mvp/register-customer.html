<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NordLedger - Register Customer</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --soft: #f1f5f9;
      --button: #0f172a;
      --button-hover: #1e293b;
      --danger-text: #b91c1c;
      --radius-xl: 28px;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
      --font: Inter, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html.auth-loading main.page {
      visibility: hidden;
    }

    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }

    .auth-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(248, 250, 252, 0.96);
      z-index: 1000;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    .auth-loader.hidden {
      display: none;
    }

    .auth-loader.error {
      color: var(--danger-text);
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 24px 48px;
    }

    .topbar,
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .topbar {
      margin-bottom: 20px;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: var(--soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .brand-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-subtitle {
      margin: 3px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .button,
    .submit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 18px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: 0.2s ease;
      border: 1px solid transparent;
      font-family: inherit;
      background: transparent;
    }

    .submit-btn {
      background: var(--button);
      color: #ffffff;
      border-color: var(--button);
    }

    .submit-btn:hover {
      background: var(--button-hover);
      border-color: var(--button-hover);
    }

    .button-secondary {
      background: #ffffff;
      color: var(--text);
      border-color: #cbd5e1;
    }

    .button-secondary:hover {
      background: var(--bg);
    }

    .card {
      padding: 24px;
    }

    .section-title {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    .section-copy {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .form {
      margin-top: 22px;
      display: grid;
      gap: 18px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .input,
    .select {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .input:focus,
    .select:focus {
      border-color: #94a3b8;
      box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.12);
    }

    .notice {
      margin-top: 18px;
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .notice.success {
      color: #14805e;
    }

    @media (max-width: 720px) {
      .page {
        padding: 20px 16px 36px;
      }

      .topbar,
      .card {
        padding: 20px;
        border-radius: 24px;
      }

      .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script>
    document.documentElement.classList.add("auth-loading");
  </script>
</head>
<body>
  <div class="auth-loader" id="authLoader">Checking your session…</div>

  <main class="page">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">NL</div>
        <div>
          <p class="brand-title">NordLedger</p>
          <p class="brand-subtitle" id="sessionLabel">Verifying session…</p>
        </div>
      </div>

      <nav class="nav" aria-label="Primary">
        <a href="dashboard.html" class="button button-secondary">Back to dashboard</a>
        <button type="button" class="button button-secondary" id="signOutButton">Sign out</button>
      </nav>
    </header>

    <section class="card">
      <h2 class="section-title">Register a new customer</h2>
      <p class="section-copy">
        Add a customer record for billing and invoicing. Fill in the company information below and click register.
      </p>

      <form class="form" id="customerForm">
        <div class="field">
          <label class="label" for="company_name">Company name</label>
          <input class="input" id="company_name" name="company_name" type="text" placeholder="Acme Analytics GmbH" required />
        </div>

        <div class="field">
          <label class="label" for="streetaddress">Street address</label>
          <input class="input" id="streetaddress" name="streetaddress" type="text" placeholder="Alexanderplatz 5" required />
        </div>

        <div class="two-col">
          <div class="field">
            <label class="label" for="postalcode">Postal code</label>
            <input class="input" id="postalcode" name="postalcode" type="text" placeholder="10178" required />
          </div>

          <div class="field">
            <label class="label" for="city">City</label>
            <input class="input" id="city" name="city" type="text" placeholder="Berlin" required />
          </div>
        </div>

        <div class="two-col">
          <div class="field">
            <label class="label" for="country">Country</label>
            <input class="input" id="country" name="country" type="text" placeholder="Germany" required />
          </div>

          <div class="field">
            <label class="label" for="currency">Currency</label>
            <select class="select" id="currency" name="currency" required>
              <option value="">Select currency</option>
            </select>
          </div>
        </div>

        <div class="nav">
          <button class="submit-btn" type="submit">Register customer</button>
          <button class="button button-secondary" type="button" id="clearFormBtn">Clear</button>
        </div>
      </form>

      <div class="notice" id="notice"></div>
    </section>
  </main>

  <script type="module">
    import { getUserDisplayName, getUserKey, requireAuth, signOut } from "./auth.js";
    import { generateUniqueDigits, getCustomers, saveCustomers } from "./app-data.js";

    const authLoader = document.getElementById("authLoader");
    const sessionLabel = document.getElementById("sessionLabel");
    const signOutButton = document.getElementById("signOutButton");
    const form = document.getElementById("customerForm");
    const notice = document.getElementById("notice");
    const clearFormBtn = document.getElementById("clearFormBtn");
    const currencySelect = document.getElementById("currency");

    let currentUserKey = null;

    signOutButton.addEventListener("click", () => signOut());

    function releasePage() {
      authLoader.classList.add("hidden");
      document.documentElement.classList.remove("auth-loading");
    }

    function showAuthError(message) {
      authLoader.textContent = message;
      authLoader.classList.add("error");
      document.documentElement.classList.remove("auth-loading");
    }

    function populateCurrencies() {
      let currencies = [];

      try {
        if (window.Intl && typeof Intl.supportedValuesOf === "function") {
          currencies = Intl.supportedValuesOf("currency");
        }
      } catch (error) {
        currencies = [];
      }

      if (!currencies.length) {
        currencies = ["EUR", "SEK", "USD", "GBP"];
      }

      const preferred = ["EUR", "SEK", "USD", "GBP"];
      const ordered = [...new Set([...preferred, ...currencies.sort()])];

      ordered.forEach((code) => {
        const option = document.createElement("option");
        option.value = code;
        option.textContent = code;
        currencySelect.appendChild(option);
      });
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const customers = getCustomers(currentUserKey);
      const existingIds = new Set(
        customers
          .map((customer) => String(customer.customer_id))
          .filter(Boolean)
      );

      let customerId;

      try {
        customerId = generateUniqueDigits(existingIds, 6);
      } catch (error) {
        notice.textContent = error.message;
        notice.className = "notice";
        return;
      }

      const customer = {
        customer_id: customerId,
        company_name: document.getElementById("company_name").value.trim(),
        streetaddress: document.getElementById("streetaddress").value.trim(),
        postalcode: document.getElementById("postalcode").value.trim(),
        city: document.getElementById("city").value.trim(),
        country: document.getElementById("country").value.trim(),
        currency: document.getElementById("currency").value
      };

      customers.push(customer);
      saveCustomers(currentUserKey, customers);

      notice.textContent = "Customer registered successfully with ID " + customer.customer_id + ".";
      notice.className = "notice success";
      form.reset();
    });

    clearFormBtn.addEventListener("click", () => {
      form.reset();
      notice.textContent = "";
      notice.className = "notice";
    });

    populateCurrencies();

    (async function initPage() {
      try {
        const session = await requireAuth({ requestedPath: window.location.pathname });
        currentUserKey = getUserKey(session);
        sessionLabel.textContent = "Signed in as " + getUserDisplayName(session);
        releasePage();
      } catch (error) {
        showAuthError(error?.message || "Authentication could not be completed.");
      }
    })();
  </script>
</body>
</html>
