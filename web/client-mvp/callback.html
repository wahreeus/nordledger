<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NordLedger Signing In</title>
  <style>
    :root {
      --bg: #020817;
      --card-bg: #ffffff;
      --text: #ffffff;
      --dark: #020617;
      --soft-2: #64748b;
      --danger: #b91c1c;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      --radius-xl: 28px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      font-family: var(--font);
    }

    body {
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.18), transparent 32%),
        linear-gradient(to bottom, rgba(15, 23, 42, 0.1), rgba(15, 23, 42, 0.9));
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card-bg);
      color: var(--dark);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 28px;
      animation: fadeUp 0.45s ease forwards;
    }

    .title {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .copy {
      margin: 0;
      color: var(--soft-2);
      font-size: 14px;
      line-height: 1.7;
    }

    .copy.error {
      color: var(--danger);
    }

    .link-row {
      margin-top: 16px;
    }

    .back-link {
      color: #0f172a;
      font-weight: 600;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1 class="title">Signing you in</h1>
      <p class="copy" id="statusText">Completing secure authentication and preparing your dashboard.</p>
      <div class="link-row" id="backLinkRow" hidden>
        <a class="back-link" href="/index.html">Return to sign-in</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { handleCallback } from "./auth.js";

    const statusText = document.getElementById("statusText");
    const backLinkRow = document.getElementById("backLinkRow");

    function showError(message) {
      statusText.textContent = "Sign-in failed: " + message;
      statusText.classList.add("error");
      backLinkRow.hidden = false;
    }

    (async function finishSignIn() {
      try {
        await handleCallback({
          onStatusChange(message) {
            statusText.textContent = message;
          }
        });
      } catch (error) {
        console.error(error);
        showError(error.message || "Authentication could not be completed.");
      }
    })();
  </script>
</body>
</html>
