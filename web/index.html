<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NordLedger Sign In</title>
  <style>
    :root {
      --bg: #020817;
      --card-bg: #ffffff;
      --text: #ffffff;
      --dark: #020617;
      --soft: #f1f5f9;
      --soft-2: #64748b;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      --radius-xl: 28px;
      --radius-md: 14px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      font-family: var(--font);
    }

    body {
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.18), transparent 32%),
        linear-gradient(to bottom, rgba(15, 23, 42, 0.1), rgba(15, 23, 42, 0.9));
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card-bg);
      color: var(--dark);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
      animation: fadeUp 0.45s ease forwards;
    }

    .card-head {
      padding: 28px 28px 16px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--soft);
      color: #475569;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .card-title {
      margin: 0;
      font-size: 36px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .card-copy {
      margin: 10px 0 0;
      color: #64748b;
      font-size: 14px;
      line-height: 1.7;
    }

    .card-body {
      padding: 8px 28px 28px;
    }

    .form {
      display: grid;
      gap: 20px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .label {
      font-size: 14px;
      font-weight: 600;
      color: #0f172a;
    }

    .input {
      width: 100%;
      height: 46px;
      border-radius: var(--radius-md);
      border: 1px solid #cbd5e1;
      background: #ffffff;
      padding: 0 14px;
      font-size: 14px;
      color: #0f172a;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input:focus {
      border-color: #67e8f9;
      box-shadow: 0 0 0 4px rgba(103, 232, 249, 0.16);
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap .input {
      padding-right: 48px;
    }

    .icon-button {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      padding: 0;
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #64748b;
    }

    .icon-button:hover {
      color: #0f172a;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #334155;
      font-size: 14px;
    }

    .checkbox {
      width: 16px;
      height: 16px;
      accent-color: #0f172a;
      cursor: pointer;
    }

    .submit {
      height: 46px;
      width: 100%;
      border: none;
      border-radius: var(--radius-md);
      background: #0f172a;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    .submit:hover:not(:disabled) {
      transform: translateY(-1px);
      background: #020617;
    }

    .submit:disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }

    .feedback {
      margin-top: 16px;
      min-height: 20px;
      font-size: 13px;
      color: #475569;
    }

    svg {
      display: block;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 16px;
      }

      .card-head,
      .card-body {
        padding-left: 20px;
        padding-right: 20px;
      }

      .card-title {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="card-head">
        <h2 class="card-title">Welcome to NordLedger</h2>
        <p class="card-copy">Sign in to access customer records, invoice data, and analytics.</p>
      </div>

      <div class="card-body">
        <form class="form" id="signinForm">
          <div class="field">
            <label class="label" for="username">Username</label>
            <input class="input" id="username" name="username" type="text" placeholder="Enter your username" autocomplete="username" />
          </div>

          <div class="field">
            <label class="label" for="password">Password</label>
            <div class="password-wrap">
              <input class="input" id="password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" />
              <button class="icon-button" type="button" id="togglePassword" aria-label="Show password">
                <span id="eyeOpen">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 12C4.8 7.8 8.1 5.7 12 5.7C15.9 5.7 19.2 7.8 22 12C19.2 16.2 15.9 18.3 12 18.3C8.1 18.3 4.8 16.2 2 12Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                  </svg>
                </span>
                <span id="eyeClosed" style="display:none;">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 3L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M10.58 10.58C10.21 10.95 10 11.46 10 12C10 13.1 10.9 14 12 14C12.54 14 13.05 13.79 13.42 13.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M9.88 5.09C10.56 4.86 11.27 4.75 12 4.75C15.9 4.75 19.2 7.17 22 12C20.82 14.04 19.48 15.6 17.97 16.66" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M6.11 6.1C4.62 7.18 3.25 8.79 2 12C4.8 16.83 8.1 19.25 12 19.25C13.26 19.25 14.46 19 15.6 18.52" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
              </button>
            </div>
          </div>

          <label class="checkbox-row" for="remember">
            <input class="checkbox" id="remember" name="remember" type="checkbox" checked />
            <span>Keep me signed in</span>
          </label>

          <button class="submit" id="submitButton" type="submit" disabled>
            <span>Sign in</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M13 6L19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </form>

        <div class="feedback" id="feedback"></div>
      </div>
    </div>
  </div>

  <script>
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const rememberInput = document.getElementById('remember');
    const submitButton = document.getElementById('submitButton');
    const form = document.getElementById('signinForm');
    const feedback = document.getElementById('feedback');
    const togglePassword = document.getElementById('togglePassword');
    const eyeOpen = document.getElementById('eyeOpen');
    const eyeClosed = document.getElementById('eyeClosed');

    function updateButtonState() {
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      submitButton.disabled = !(username && password);
    }

    usernameInput.addEventListener('input', updateButtonState);
    passwordInput.addEventListener('input', updateButtonState);

    togglePassword.addEventListener('click', function () {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      togglePassword.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
      eyeOpen.style.display = isPassword ? 'none' : 'inline-flex';
      eyeClosed.style.display = isPassword ? 'inline-flex' : 'none';
    });

    form.addEventListener('submit', function (event) {
      event.preventDefault();

      const payload = {
        username: usernameInput.value.trim(),
        password: passwordInput.value,
        rememberMe: rememberInput.checked
      };

      console.log('Sign in attempt', payload);
      feedback.textContent = 'Demo sign-in successful. Opening dashboard...';
      setTimeout(function () {
        window.location.href = 'dashboard.html';
      }, 300);
    });

    updateButtonState();
  </script>
</body>
</html>
